<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mara's Auditor - Logs</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    };
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(226,232,240,.95);
      box-shadow: 0 12px 32px rgba(15,23,42,.06);
    }
    .dark .glass {
      background: rgba(15,23,42,.78);
      border-color: rgba(51,65,85,.95);
      box-shadow: 0 12px 32px rgba(2,6,23,.35);
    }
    .thin-scroll::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    .thin-scroll::-webkit-scrollbar-thumb {
      background: rgba(100,116,139,.35);
      border-radius: 999px;
    }
  </style>
</head>

<body class="bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen">
  <div class="min-h-screen flex flex-col">
    <header class="shrink-0 border-b border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 backdrop-blur px-4 md:px-6 py-3">
      <div class="flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-11 h-11 rounded-2xl bg-blue-600 text-white flex items-center justify-center shadow-lg shrink-0">
            <i class="fa-solid fa-clipboard-check"></i>
          </div>
          <div>
            <h1 class="font-black text-lg md:text-xl">Mara's Auditor</h1>
            <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500">System Logs</p>
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <button type="button" onclick="toggleTheme()" class="w-10 h-10 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700">
            <i class="fa-solid fa-moon dark:hidden text-slate-500"></i>
            <i class="fa-solid fa-sun hidden dark:inline text-slate-400"></i>
          </button>

          <button type="button" onclick="goDashboard()" class="text-xs font-bold px-3 md:px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700">
            Dashboard
          </button>

          <button type="button" onclick="goAI()" class="text-xs font-bold px-3 md:px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700">
            A.I Chat
          </button>

          <button type="button" class="text-xs font-bold px-3 md:px-4 py-2 rounded-xl border bg-blue-600 text-white border-blue-600">
            Logs
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 p-4 md:p-6 overflow-auto thin-scroll">
      <div class="max-w-7xl mx-auto glass rounded-3xl overflow-hidden">
        <div class="p-5 border-b border-slate-200 dark:border-slate-800 flex flex-col gap-4">
          <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
            <div>
              <h2 class="text-xl font-black">Activity Logs</h2>
              <p class="text-sm text-slate-500 mt-1">Track logs history.</p>
            </div>
            <button onclick="loadLogs()" class="px-4 py-2.5 rounded-xl font-bold bg-blue-600 hover:bg-blue-700 text-white">
              <i class="fa-solid fa-rotate-right mr-2"></i>Refresh Logs
            </button>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
            <div class="md:col-span-5">
              <label class="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Search</label>
              <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input
                  id="searchInput"
                  type="text"
                  placeholder="Search timestamp, actor, action, audit ID, summary, payload..."
                  class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
            </div>

            <div class="md:col-span-3">
              <label class="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Filter by Action</label>
              <select
                id="actionFilter"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="">All Actions</option>
              </select>
            </div>

            <div class="md:col-span-2">
              <label class="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Rows per Page</label>
              <select
                id="rowsPerPage"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>

            <div class="md:col-span-2 flex items-end">
              <button
                onclick="resetFilters()"
                class="w-full px-4 py-3 rounded-xl font-bold border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800"
              >
                <i class="fa-solid fa-filter-circle-xmark mr-2"></i>Reset
              </button>
            </div>
          </div>
        </div>

        <div class="overflow-auto thin-scroll">
          <div class="min-w-[1000px]">
            <table class="w-full text-left text-sm whitespace-nowrap">
              <thead class="bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
                <tr class="text-[11px] uppercase tracking-wider text-slate-500">
                  <th class="px-5 py-3 font-black">Timestamp</th>
                  <th class="px-5 py-3 font-black">Actor</th>
                  <th class="px-5 py-3 font-black">Action</th>
                  <th class="px-5 py-3 font-black">Audit ID</th>
                  <th class="px-5 py-3 font-black">Summary</th>
                  <th class="px-5 py-3 font-black">Payload</th>
                </tr>
              </thead>
              <tbody id="logsTableBody" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
            </table>
          </div>
        </div>

        <div class="p-4 md:p-5 border-t border-slate-200 dark:border-slate-800 flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
          <div id="paginationInfo" class="text-sm text-slate-500">
            Showing 0 to 0 of 0 entries
          </div>

          <div class="flex items-center gap-2 flex-wrap">
            <button id="firstPageBtn" onclick="goToPage(1)" class="px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm font-semibold">
              <i class="fa-solid fa-angles-left"></i>
            </button>
            <button id="prevPageBtn" onclick="changePage(-1)" class="px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm font-semibold">
              <i class="fa-solid fa-angle-left"></i>
            </button>
            <div id="pageNumbers" class="flex items-center gap-2 flex-wrap"></div>
            <button id="nextPageBtn" onclick="changePage(1)" class="px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm font-semibold">
              <i class="fa-solid fa-angle-right"></i>
            </button>
            <button id="lastPageBtn" onclick="goToPage(totalPages)" class="px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm font-semibold">
              <i class="fa-solid fa-angles-right"></i>
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="shrink-0 border-t border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 backdrop-blur px-4 md:px-6 py-3">
      <div class="flex flex-col md:flex-row items-center justify-between gap-2 text-xs text-slate-500">
        <div>© 2026 Mara's Auditor</div>
        <div>Logs and audit activity monitor</div>
      </div>
    </footer>
  </div>

  <script>
    let apiUrl = localStorage.getItem('maraAppUrl') || '';

    let allLogs = [];
    let filteredLogs = [];
    let currentPage = 1;
    let rowsPerPage = 10;
    let totalPages = 1;

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('maraTheme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    function applySavedTheme() {
      const saved = localStorage.getItem('maraTheme');
      if (saved === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    }

    function goDashboard() {
      window.location.href = 'index.html';
    }

    function goAI() {
      window.location.href = 'AI.html';
    }

    function goLogs() {
      window.location.href = 'Logs.html';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getRowSearchText(row) {
      return [
        row.timestamp,
        row.actor,
        row.action,
        row.audit_id,
        row.summary,
        row.payload_json
      ].map(v => String(v ?? '').toLowerCase()).join(' ');
    }

    function populateActionFilter(rows) {
      const select = document.getElementById('actionFilter');
      const currentValue = select.value;

      const actions = [...new Set(
        rows
          .map(r => String(r.action || '').trim())
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      select.innerHTML = `<option value="">All Actions</option>` +
        actions.map(action => `<option value="${escapeHtml(action)}">${escapeHtml(action)}</option>`).join('');

      if (actions.includes(currentValue)) {
        select.value = currentValue;
      }
    }

    function applyFilters() {
      const searchValue = document.getElementById('searchInput').value.trim().toLowerCase();
      const actionValue = document.getElementById('actionFilter').value.trim();

      filteredLogs = allLogs.filter(row => {
        const matchesSearch = !searchValue || getRowSearchText(row).includes(searchValue);
        const matchesAction = !actionValue || String(row.action || '').trim() === actionValue;
        return matchesSearch && matchesAction;
      });

      rowsPerPage = parseInt(document.getElementById('rowsPerPage').value, 10) || 10;
      totalPages = Math.max(1, Math.ceil(filteredLogs.length / rowsPerPage));
      currentPage = Math.min(currentPage, totalPages);

      renderTable();
      renderPagination();
    }

    function renderTable() {
      const tbody = document.getElementById('logsTableBody');

      if (!filteredLogs.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="px-5 py-10 text-center text-slate-500">No logs found.</td>
          </tr>
        `;
        updatePaginationInfo(0, 0, 0);
        return;
      }

      const startIndex = (currentPage - 1) * rowsPerPage;
      const endIndex = Math.min(startIndex + rowsPerPage, filteredLogs.length);
      const pageRows = filteredLogs.slice(startIndex, endIndex);

      tbody.innerHTML = pageRows.map(row => `
        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition align-top">
          <td class="px-5 py-4">${escapeHtml(row.timestamp || '')}</td>
          <td class="px-5 py-4 font-semibold">${escapeHtml(row.actor || '')}</td>
          <td class="px-5 py-4">
            <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold bg-slate-100 dark:bg-slate-800">
              ${escapeHtml(row.action || '')}
            </span>
          </td>
          <td class="px-5 py-4">${escapeHtml(row.audit_id || '-')}</td>
          <td class="px-5 py-4 max-w-[320px] whitespace-normal break-words">${escapeHtml(row.summary || '')}</td>
          <td class="px-5 py-4 max-w-[420px] truncate" title="${escapeHtml(row.payload_json || '')}">
            ${escapeHtml(row.payload_json || '')}
          </td>
        </tr>
      `).join('');

      updatePaginationInfo(startIndex + 1, endIndex, filteredLogs.length);
    }

    function updatePaginationInfo(start, end, total) {
      const info = document.getElementById('paginationInfo');
      info.textContent = `Showing ${start} to ${end} of ${total} entries`;
    }

    function renderPagination() {
      const pageNumbers = document.getElementById('pageNumbers');
      const firstBtn = document.getElementById('firstPageBtn');
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      const lastBtn = document.getElementById('lastPageBtn');

      firstBtn.disabled = currentPage <= 1;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
      lastBtn.disabled = currentPage >= totalPages;

      [firstBtn, prevBtn, nextBtn, lastBtn].forEach(btn => {
        btn.classList.toggle('opacity-50', btn.disabled);
        btn.classList.toggle('cursor-not-allowed', btn.disabled);
      });

      let pages = [];
      const maxVisible = 5;
      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, startPage + maxVisible - 1);

      if ((endPage - startPage + 1) < maxVisible) {
        startPage = Math.max(1, endPage - maxVisible + 1);
      }

      for (let i = startPage; i <= endPage; i++) {
        pages.push(i);
      }

      pageNumbers.innerHTML = pages.map(page => `
        <button
          onclick="goToPage(${page})"
          class="px-3 py-2 rounded-xl text-sm font-bold border ${
            page === currentPage
              ? 'bg-blue-600 text-white border-blue-600'
              : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800'
          }"
        >
          ${page}
        </button>
      `).join('');
    }

    function goToPage(page) {
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
      renderPagination();
    }

    function changePage(step) {
      goToPage(currentPage + step);
    }

    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('actionFilter').value = '';
      document.getElementById('rowsPerPage').value = '10';
      currentPage = 1;
      applyFilters();
    }

    async function loadLogs() {
      if (!apiUrl) {
        alert('Please set your Apps Script URL first in the dashboard.');
        return;
      }

      const tbody = document.getElementById('logsTableBody');
      tbody.innerHTML = `
        <tr>
          <td colspan="6" class="px-5 py-10 text-center text-slate-500">Loading logs...</td>
        </tr>
      `;

      try {
        const res = await fetch(apiUrl + '?action=logs&t=' + Date.now(), { method: 'GET', cache: 'no-store' });
        const text = await res.text();
        const json = JSON.parse(text);

        if (!json || json.status !== 'success') {
          throw new Error(json?.message || 'Failed to load logs.');
        }

        allLogs = Array.isArray(json.data) ? json.data : [];
        populateActionFilter(allLogs);
        currentPage = 1;
        applyFilters();
      } catch (error) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="px-5 py-10 text-center text-red-500">${escapeHtml(error.message || 'Failed to load logs.')}</td>
          </tr>
        `;
        document.getElementById('paginationInfo').textContent = 'Showing 0 to 0 of 0 entries';
        document.getElementById('pageNumbers').innerHTML = '';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      applySavedTheme();

      document.getElementById('searchInput').addEventListener('input', function() {
        currentPage = 1;
        applyFilters();
      });

      document.getElementById('actionFilter').addEventListener('change', function() {
        currentPage = 1;
        applyFilters();
      });

      document.getElementById('rowsPerPage').addEventListener('change', function() {
        currentPage = 1;
        applyFilters();
      });

      loadLogs();
    });
  </script>
</body>
</html>
